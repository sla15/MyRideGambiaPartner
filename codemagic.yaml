workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      java: 21
      groups:
        - google_play_credentials # SUPABASE_*, FCM_*, etc.
        - android_signing         # CM_KEYSTORE_BASE64, CM_KEYSTORE_PASSWORD, etc.
      vars:
        PACKAGE_NAME: "com.dropoffgambia.partner"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor project
        script: npx cap sync android
      - name: Build Android App Bundle & APK
        script: |
          cd android
          chmod +x gradlew
          
          if [ -n "$CM_KEYSTORE_BASE64" ]; then
            echo "Decoding Keystore..."
            echo $CM_KEYSTORE_BASE64 | base64 --decode > /tmp/keystore.jks
            
            ./gradlew bundleRelease assembleRelease \
              -Pandroid.injected.signing.store.file="/tmp/keystore.jks" \
              -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
          else
            echo "FATAL ERROR: CM_KEYSTORE_BASE64 not set."
            exit 1
          fi
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - dropoffgm@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      groups:
        - google_play_credentials
        - apple_auth_credentials
      vars:
        BUNDLE_ID: "com.dropoffgambia.partner"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor project
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS App
        script: xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - dropoffgm@gmail.com
        notify:
          success: true
          failure: true
