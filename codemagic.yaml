# Codemagic Build Configuration for DROPOFF Partner App
// turbo-all
workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.dropoffgambia.partner"
        JAVA_VERSION: "17"
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor project
        script: npx cap sync android
      - name: Decode Keystore
        script: echo $CM_KEYSTORE | base64 --decode > android/app/dropoff.keystore
      - name: Build Android App Bundle & APK
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=dropoff.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - dropoffgm@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - apple_auth_credentials
      vars:
        BUNDLE_ID: "com.dropoffgambia.partner"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor project
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS App
        script: xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - dropoffgm@gmail.com
        notify:
          success: true
          failure: true
